name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When the release-please PR is merged into main, release-please creates a
  # GitHub Release and tag (e.g. v5.0.0). Because the release is created with
  # the default GITHUB_TOKEN, the `release: published` event does NOT trigger
  # downstream workflows. To still get a container image tagged with the release
  # version, we build and push it directly here, gated on `release_created`.
  #
  # Note: pushes to main (including the release-please merge commit) continue to
  # build the dev image (mobiera/<repo>:main) via ci-cd.yml — that is unchanged.
  release-build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: mobiera/${{ github.event.repository.name }}
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Configure Maven settings
        env:
          MVN_SETTINGS: ${{ secrets.MVN_SETTINGS }}
        run: |
          mkdir -p ~/.m2
          printf '%s' "$MVN_SETTINGS" > ~/.m2/settings.xml

      - name: Build with Maven
        run: mvn -B -ntp package -DskipTests -Dquarkus.container-image.build=false -Dquarkus.container-image.push=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build and push container image
        run: |
          echo "Building ${IMAGE}:main and ${IMAGE}:${TAG_NAME} from tag ${TAG_NAME}"
          docker build -f src/main/docker/Dockerfile.jvm \
            -t "${IMAGE}:main" \
            -t "${IMAGE}:${TAG_NAME}" .
          docker push "${IMAGE}:main"
          docker push "${IMAGE}:${TAG_NAME}"
