name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # Docker Hub image (public): mobiera/<repo>
  IMAGE: "mobiera/${{ github.event.repository.name }}"
  # Default tag is main, will be overridden based on branch/tag
  IMAGE_TAG: "main"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3-eclipse-temurin-25

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set image tag
      run: |
        # If it's not main branch, use branch name as tag
        if [[ "${{ github.ref_name }}" != "main" && "${{ github.ref_type }}" == "branch" ]]; then
          echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        # If it's a tag (not empty), use tag name without 'v' prefix
        elif [[ "${{ github.ref_type }}" == "tag" ]]; then
          echo "IMAGE_TAG=$(echo "${{ github.ref_name }}" | sed 's/v//')" >> $GITHUB_ENV
        fi

    - name: Log tag info
      run: |
        echo "Tag: ${{ github.ref_name }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Image Tag: ${{ env.IMAGE_TAG }}"

    - name: Create Maven settings directory
      run: |
        export MVN_SETTINGS_DIR="/builds/current/${{ github.event.repository.name }}/${{ env.IMAGE_TAG }}"
        mkdir -p ${MVN_SETTINGS_DIR}

    - name: Configure Maven settings
      run: |
        export MVN_SETTINGS_DIR="/builds/current/${{ github.event.repository.name }}/${{ env.IMAGE_TAG }}"
        echo "$MVN_SETTINGS" > "${MVN_SETTINGS_DIR}/settings.xml"
      env:
        MVN_SETTINGS: ${{ secrets.MVN_SETTINGS }}

    - name: Build with Maven
      run: |
        export MVN_SETTINGS_DIR="/builds/current/${{ github.event.repository.name }}/${{ env.IMAGE_TAG }}"
        export MVN_SETTINGS="${MVN_SETTINGS_DIR}/settings.xml"
        unset MAVEN_CONFIG && mvn package -B -ntp -DskipTests -Dquarkus.container-image.build=false -Dquarkus.container-image.push=false -s "${MVN_SETTINGS}"

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          target/**
          ~/.m2/**
        retention-days: 7

  docker-package:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set image tag
      run: |
        # If it's not main branch, use branch name as tag
        if [[ "${{ github.ref_name }}" != "main" && "${{ github.ref_type }}" == "branch" ]]; then
          echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        # If it's a tag (not empty), use tag name without 'v' prefix
        elif [[ "${{ github.ref_type }}" == "tag" ]]; then
          echo "IMAGE_TAG=$(echo "${{ github.ref_name }}" | sed 's/v//')" >> $GITHUB_ENV
        fi

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: .

    - name: Verify build artifacts
      run: |
        echo "Current directory contents:"
        ls -la
        echo "Looking for target directory:"
        find . -name "target" -type d

        echo "Moving artifacts to correct location..."
        # Move target directory if it's in the nested structure
        if [ -d "__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/target" ]; then
          echo "Moving target from nested structure..."
          mv __w/${{ github.event.repository.name }}/${{ github.event.repository.name }}/target ./
          echo "Target moved successfully"
        fi

        echo "Final verification:"
        ls -la target/ 2>/dev/null || echo "Target directory not found"
        ls -la target/quarkus-app/ 2>/dev/null || echo "Quarkus-app directory not found"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_LOGIN }}
        password: ${{ secrets.DOCKER_HUB_PWD }}

    - name: Build and push Docker image
      run: |
        echo "Build and push ${IMAGE}:${IMAGE_TAG} image..."
        docker build -f src/main/docker/Dockerfile.jvm -t ${{ env.IMAGE }}:${{ env.IMAGE_TAG }} .
        docker push ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

  test:
    runs-on: ubuntu-latest
    container:
      image: maven:3-eclipse-temurin-25

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure Maven settings
      env:
        MVN_SETTINGS: ${{ secrets.MVN_SETTINGS }}
      run: |
        mkdir -p ~/.m2
        printf '%s' "$MVN_SETTINGS" > ~/.m2/settings.xml

    - name: Run tests
      run: |
        unset MAVEN_CONFIG && mvn -B -ntp test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-package
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        image-ref: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: 'trivy-results.sarif'

  sast:
    runs-on: ubuntu-latest
    container:
      image: maven:3-eclipse-temurin-25

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure Maven settings
      env:
        MVN_SETTINGS: ${{ secrets.MVN_SETTINGS }}
      run: |
        mkdir -p ~/.m2
        printf '%s' "$MVN_SETTINGS" > ~/.m2/settings.xml

    - name: Run SpotBugs static analysis
      run: |
        unset MAVEN_CONFIG && mvn -B -ntp spotbugs:check || true

    - name: Upload SAST results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sast-results
        path: target/spotbugsXml.xml
        retention-days: 7
